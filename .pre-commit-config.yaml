repos:
  # === PRE-COMMIT STAGE (quick checks on every commit) ===

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      #- id: end-of-file-fixer ## the ean-db.json does not have an ending line atm
      - id: check-yaml
      - id: check-added-large-files

  # === COMMIT-MSG STAGE (enforce conventional commits) ===

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  # === PRE-PUSH STAGE (full test) ===

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: pytest
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]  # Run with: pre-commit run lychee --hook-stage manual

  - repo: https://github.com/lycheeverse/lychee
    rev: lychee-v0.22.0
    hooks:
      - id: lychee
        args: ["--no-progress", "--timeout", "10"]
        types: [markdown, rst]
        stages: [pre-push]


# Global vocabulary definitions for inventory-md
# This provides consistent category hierarchies across all inventory instances
#
# Format:
#   concept-id:
#     prefLabel: "Display name"
#     altLabel:
#       en: ["synonym1", "synonym2"]
#       nb: ["norsk synonym"]
#     broader: "parent-category"  # or list: ["parent1", "parent2"]
#     narrower: ["child1", "child2"]
#     uri: "https://..."            # Preferred/canonical URI for this concept
#                                   # (e.g. DBpedia, AGROVOC, Wikidata).
#                                   # Used as the concept's primary identifier.
#     source_uris:                  # All known external source URIs for this concept.
#       - "https://dbpedia.org/..."  #   Every source that maps to this concept.
#       - "off:en:some-category"    #   Prefixes: off:, https://aims.fao.org/ (agrovoc),
#                                   #   https://dbpedia.org/, https://www.wikidata.org/
#     excluded_sources:             # Sources explicitly checked and found inapplicable.
#       - agrovoc                   #   The builder will skip lookup for these sources.
#
# Categories without broader are top-level roots.

concepts:
